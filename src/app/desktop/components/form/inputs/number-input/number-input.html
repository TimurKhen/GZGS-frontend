@if (isRequred()) {
    <tui-textfield 
        iconEnd="@tui.badge-alert" 
        class="textfield-container" 
        [attr.tuiTheme]="'dark'"
        [ngClass]="{'error': !control().valid && control().dirty}"
    > 
        <label
            tuiLabel
        >{{placeholderText()}}</label>
        <input
            type="number"
            [min]="0"
            tuiInputNumber
            [formControl]="control()"
            />
        </tui-textfield>
    } @else {
        <tui-textfield 
        class="textfield-container" 
        [attr.tuiTheme]="'dark'"
        [ngClass]="{'error': !control().valid && control().dirty}"
        >
        <label
        tuiLabel
        >{{placeholderText()}}</label>
        <input
            type="number"
            [min]="0"
            tuiInputNumber
            [formControl]="control()"
        />
    </tui-textfield>
} 
@if (!control().valid && control().dirty) {
    @if (control().errors['min']) {
        <tui-error [error]="'Минимальное значение - 0'" />
    } @else {
        <tui-error [error]="'Обязательно'" />
    }
}
