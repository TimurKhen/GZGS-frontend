<tui-textfield 
    class="date-container" 
    [attr.tuiTheme]="'dark'"
    [ngClass]="{'error': !control().valid && control().dirty}"
>
    <label tuiLabel>{{placeholderText()}}</label>
    <input
        tuiInputDate
        [ngModel]="dateValue"
        (ngModelChange)="dateValue = $event; onDateChange()"
        [min]="today"
    />
    <tui-calendar *tuiTextfieldDropdown />
</tui-textfield>

@if (!control().valid && control().dirty) {
    <tui-error [error]="'Обязательно'" />
}
