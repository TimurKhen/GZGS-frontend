<div class="container">
    <div class="content">
        <span class="back">
            <tui-icon class="arrow-left" icon="@tui.arrow-left"></tui-icon>
            <h2>Назад</h2>
        </span>
        <div class="information">
            <div class="main">
                <div class="left">
                    <div class="text">
                        <h1>Яндекс плюс</h1>
                        <is-paid-status [isPaid]="true"></is-paid-status>
                    </div>
                    <div class="image">
                        <img width="40" [src]="subscriptionData()?.subscription_avatar_url">
                    </div>
                </div>
                <div class="right">
                    <div class="price-and-date">
                        <h3>{{subscriptionData()?.cost}}₽ в месяц</h3>
                        <div class="bottom">
                            <h3>списание:</h3>
                            <h3>{{parseDate(subscriptionData()?.next_billind) | date:'longDate'}}</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="statuses">
  <!-- // TODO
  //  Сделать это циклом!!!!!!!!!!! -->
            <status-block
                [blockData]="isPaidStatusBlock()"
                (statusChange)="changeStatus(isPaidStatusBlock)"
            ></status-block>
            <status-block
                [blockData]="notificationsStatusBlock()"
                (statusChange)="changeStatus(notificationsStatusBlock)"
            ></status-block>
            <status-block
                [blockData]="usedStatusBlock()"
                (statusChange)="changeStatus(usedStatusBlock)"
            ></status-block>
        </div>
        <div class="actions-buttons">
            @for (item of actionButtons(); track item) {
                <button class="action-button" (click)="item.action()">
                    {{item.name}}
                </button>
            }
        </div>

        <div class="edit">
            <h2>Измененить информацию:</h2>
            <form>
                <div class="inputs">
                    <file-input 
                        [control]="editForm.get('subscription_avatar_url')"
                    ></file-input>
                    <div class="other-inputs">
                        <text-input 
                            [control]="editForm.get('name')"
                            [placeholderText]="'Название сервиса'"
                            [isRequred]="true"
                            ></text-input>
                        <text-input 
                            [control]="editForm.get('cost')"
                            [placeholderText]="'Цена в месяц'"
                            [isRequred]="true"
                        ></text-input>
                            
                        <date-input
                            [control]="editForm.get('next_billing')"
                            [placeholderText]="'Дата списания'"
                        ></date-input>

                        <text-input 
                            [control]="editForm.get('url_service')"
                            [placeholderText]="'Ссылка на сервис'"
                        ></text-input>
                        <text-input 
                            [control]="editForm.get('cancellation_link')"
                            [placeholderText]="'Ссылка на отмену'"
                        ></text-input>
                        <text-input 
                            [control]="editForm.get('category')"
                            [placeholderText]="'Категория'"
                        ></text-input>
                    </div>
                </div>

                <button (click)="saveChanges($event)">Подтвердить изменения</button>
                <h1>{{ editForm.value | json }}</h1>
            </form>
        </div>
    </div>
</div>
