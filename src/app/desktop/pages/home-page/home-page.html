<div class="container">
    <div class="content">
        <h1>Добрый день, Илья Романыч</h1>
        <div class="grid">
            <div class="subscribtions-container">
                <h2>Ваши подписки:</h2>
                <div class="subscribtions">
                    @for (item of realSubscriptions(); track item) {
                        <assets-subscribtion
                            [routerLink]="['subscription', item.subscription_id]"
                            [subscribtionData]="item"
                        ></assets-subscribtion>
                    }
                    <button routerLink="add">
                        Добавить подписку
                    </button>
                </div>
            </div>
            <div class="controls">
                <app-spending
                    [subscriptions]="realSubscriptions()"
                ></app-spending>

                <div class="buttons">
                    <button-with-image 
                        [routerLink]="'add'"
                        [imageURL]="'icons/subscribtionImage.svg'" 
                        label="Добавить подписку"
                    ></button-with-image>
                    <button-with-image
                        [imageURL]="'icons/ymoney.svg'"
                        label="Подключить юmoney"
                    ></button-with-image>
                </div>
            </div>
        </div>
    </div>
</div>
