<div class="container">
    <div class="content">
        @if (userName()) {
            <h1 class="hello">Добрый день, {{userName()}}</h1>
        } @else {
            <div class="skeleton-wrapper">
                <h1>Добрый день,</h1>
                <div class="skeleton-text"></div>
            </div>
        }
        <div class="grid">
            <div class="subscribtions-container">
                <h2>Ваши подписки:</h2>
                <div class="subscribtions">
                    @for (item of smalledCountOfSubscriptions(); track item; let i = $index) {
                        <assets-subscribtion
                            [routerLink]="['subscription', item.subscription_id]"
                            [subscribtionData]="item"
                        ></assets-subscribtion>
                    }
                    @if (realSubscriptions().length > maxSubscriptionsOnScreenCount()) {
                        <button 
                            routerLink="subscriptions"
                            class="more-button" size="m" tuiButton
                            >Ещё {{realSubscriptions().length - smalledCountOfSubscriptions().length}}</button>
                    }
                    <button routerLink="add">
                        Добавить подписку
                    </button>
                </div>
            </div>
            <div class="controls">
                <app-spending
                    [attr.tuiTheme]="'dark'"
                    [subscriptions]="realSubscriptions()"
                ></app-spending>

                <div class="buttons">
                    <button-with-image 
                        [routerLink]="'add'"
                        [imageURL]="'icons/subscribtionImage.svg'" 
                        label="Добавить подписку"
                    ></button-with-image>
                </div>
            </div>
        </div>
    </div>
</div>
