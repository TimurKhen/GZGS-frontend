<div class="container">
    <div class="content">
        <h1>Добрый день, Илья Романыч</h1>
        <div class="grid">
            <div class="subscribtions-container">
                <h2>Ваши подписки:</h2>
                <div class="subscribtions">
                    @for (item of subscribtions; track item) {
                        <assets-subscribtion
                            [subscribtionData]="item"
                        ></assets-subscribtion>
                    }
                </div>
            </div>
            <div class="controls">
                <app-spending
                    [subscriptions]="forRingsubscribtions"
                ></app-spending>
            </div>
        </div>
    </div>
</div>
