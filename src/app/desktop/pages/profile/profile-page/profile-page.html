<div class="container">
    <div class="content">
        <h2>Ваш аккаунт</h2>
        <div class="form">
            <div class="user-information">
                <span class="image">
                    <img width="100" [src]="userAvatarUrl()">
                </span>
                @if (userName()) {
                    <h2>{{userName()}}</h2>
                } @else {
                    <div class="skeleton-wrapper">
                        <div class="skeleton-text"></div>
                    </div>
                }
                <p class="email-text">{{userData().email}}</p>
                <div class="edit">
                    <status-block
                        [blockData]="notificationBlock()"
                        (statusChange)="changeStatus(notificationBlock)"
                    ></status-block>
                </div>
            </div>

            <div class="email">
                <div class="email-container">
                    <assets-add-email
                        [isRegistratedInput]="isConnectedEmail()"
                    ></assets-add-email>
                </div>
            </div>
        </div>

        <button
            size="m"
            tuiButton
            type="button"
            (click)="logout()"
        >
            Выйти из аккаунта
        </button>
    </div>
</div>
