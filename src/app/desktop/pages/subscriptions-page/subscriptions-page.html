<div class="container">
    <div class="content">
        <span class="back">
            <h2>Подписки</h2>
        </span>
        @if (realSubscriptions().length !== 0) {
            <div class="filters">
                <filters 
                    [filters]="['Оплаченные', 'Не оплаченные']" 
                    (changedFilters)="changeFilter($event)"
                    [isMultiple]="true"
                    ></filters>
            </div>
            <div class="subscriptions">
                    @for (item of filteredSubscriptions(); track item) {
                        <subscription-big 
                            [routerLink]="['../subscription', item.subscription_id]"
                            [subscribtionData]="item"
                            animate.enter="appear"
                        ></subscription-big>
                    }
            </div>
        } @else {
            @if (isLoading()) {
                <div class="loading">
                    <tui-loader />
                </div>
            } @else {
                <div class="no-subscriptions">
                    <p>У вас пока нет подписок.</p>
                    <a routerLink="add">Добавим новую?</a>
                </div>
            }
        }
    </div>
</div>
