<div class="container">
    <div class="content">
        <span class="back">
            <h2>Подписки</h2>
        </span>
        <div class="spending-container">
            <div class="spending">
                <spending-block [descriptionText]="'Текущие траты'" [subscriptions]="realSubscriptions()"></spending-block>
                <spending-block [descriptionText]="'Прогноз трат'" [subscriptions]="usingForAnalityics()"></spending-block>
                <spending-block [monthsToCalc]="12" [descriptionText]="'Текущие траты на год'" [subscriptions]="realSubscriptions()"></spending-block>
                <spending-block [monthsToCalc]="12" [descriptionText]="'Прогноз трат на год'" [subscriptions]="usingForAnalityics()"></spending-block>
            </div>
        </div>
        <div class="subscriptions">
            <div class="filters">
                <filters [isMultiple]="false" [filters]="['Категории', 'Сервисы']" (changedFilters)="changeFilter($event)"></filters>
                <p>Использовать в прогнозе:</p>
            </div>
            @for (item of realSubscriptions(); track item; let i = $index) {
                <div class="subscription-container">
                    <subscription-big 
                        [subscribtionData]="item"
                        animate.enter="appear"
                        [routerLink]="['../subscription', item.subscription_id]"
                        class="block"
                    ></subscription-big>
                    <label 
                        class="checkbox"
                        animate.enter="appear"
                    >
                        <input
                            tuiCheckbox
                            type="checkbox"
                            [ngModel]="checkboxStates()[i]"
                            (ngModelChange)="onCheckboxChange($event, i)"
                        />
                    </label>
                </div>
            }
        </div>
    </div>
</div>
