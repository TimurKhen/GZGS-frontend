<div class="block" [attr.tuiTheme]="'dark'">
    <tui-ring-chart
        [size]="isMobile() ? 'l' : 'xl'" 
        [value]="prices()"
        [(activeItemIndex)]="index"
        class="ring"
    >
        <h2>{{ sum | tuiAmount: 'RUB' | async }}</h2>
        <p>{{ label }}</p>
    </tui-ring-chart>

    <h3>{{descriptionText()}}</h3>
</div>
