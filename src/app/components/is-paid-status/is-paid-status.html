<div class="paid-container">
    @if (isPaid()) {
        <span class="paid-icon icon-block">
            <tui-icon class="icon" icon="@tui.check"></tui-icon>
        </span>
        <p class="is-paid-text">{{text()}}</p>
    } @else {
        <span class="unpaid-icon icon-block">
            <tui-icon class="icon" icon="@tui.x"></tui-icon>
        </span>
        <p class="is-paid-text">{{secondText()}}</p>
    }
</div>
